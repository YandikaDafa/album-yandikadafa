<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Album Wisuda: Perunggu Abadi</title>
    <style>
        /* CSS: Desain elegan dan bersih */
        body { 
            /* Animasi Gradasi yang bergerak */
            background: linear-gradient(-45deg, #1a1a1a, #2d1b4e, #1a1a1a, #1e3a8a);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            
            color: white; 
            text-align: center; 
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Keyframes untuk membuat warna background bergerak */
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Tambahkan efek kaca (glassmorphism) pada container agar terlihat mewah */
        #container { 
            width: 100%; 
            max-width: 600px; 
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        #display-img { 
            width: 100%; 
            height: auto; /* Penting: agar rasio foto tetap terjaga */
            max-height: 300px; /* Batasi tinggi agar tidak terlalu panjang di HP */
            object-fit: cover;
            border-radius: 15px; 
            transition: opacity 1.5s ease-in-out; 
        }
        
        #lyrics { 
            font-size: 24px; 
            margin-top: 30px; 
            font-weight: 300; 
            min-height: 50px;
            transition: opacity 0.5s ease-in-out; /* Animasi muncul pelan */
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 50px;
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.05); }
        .fade-out { opacity: 0; }
    </style>
</head>
<body>

    <div id="container">
        <img id="display-img" src="media/foto/wisuda1.jpg" alt="Foto Wisuda">
        <div id="lyrics"></div>
        <button id="start-btn">Mulai Kenangan Wisuda</button>
    </div>

    <!-- Pastikan path file benar -->
    <audio id="music" src="media/lagu/perunggu_abadi.mp3"></audio>

    <script>
    const audio = document.getElementById("music");
    const img = document.getElementById("display-img");
    const lyricsDiv = document.getElementById("lyrics");
    const btn = document.getElementById("start-btn");

    // 1. Konfigurasi
    const totalFoto = 25; // Anda punya 25 foto
    const durasiPerFoto = 9.2; // 232 detik / 25 foto

    // 2. Data Lirik (Ubah teks di sini sesuai keinginan)
    const daftarLirik = [
        { time: 5, text: "Dihentak sunyi..." },
        { time: 9, text: "geram gusarmu mulai..." },
        { time: 14, text: "Gerayangi kupingku.." },
        { time: 20, text: "Dibungkam lagi..." },
        { time: 24, text: "janji yang sumbang itu..." },
        { time: 29, text: "Tak semenarik dulu..." },
        { time: 34, text: "Sejuk wangimu..." },
        { time: 38, text: "tersisa di sela-sela..." },
        { time: 44, text: "Baju hangatku..." },
        { time: 50, text: "Terakhir kali..." },
        { time: 53, text: "Kita bicarakan semua..." },
        { time: 59, text: "Besok kan bagaimana?..." },
        { time: 64, text: "Lihatlah semua sudut itu..." },
        { time: 72, text: "Bandung kan selalu memelukmu..." },
        { time: 79, text: "Dinginnya hangatkanmu selalu..." },
        { time: 86, text: "Dilengkapi lapisan selimut..." },
        { time: 92, text: "Yang berupa..." },
        { time: 96, text: "dekapan nadi..." },
        { time: 99, text: "yang mengalir..." },
        { time: 104, text: "menjadi seruan..." },
        { time: 108, text: "Di hati...." }, 
        { time: 110, text: "bermuarakan kabar baru..." },
        { time: 118, text: "Tentang mimpi" },
        { time: 121, text: "" }

    ];

    btn.addEventListener("click", () => {
        audio.play();
        btn.style.display = "none";
        
        audio.addEventListener("timeupdate", () => {
            const currentTime = audio.currentTime;

            // --- Logika Foto (Looping) ---
            // Menggunakan modulo (%) agar index kembali ke 1 setelah sampai 25
            let index = (Math.floor(currentTime / durasiPerFoto) % totalFoto) + 1;
            let targetSrc = `media/foto/${index}.jpg`;
            
            if (img.getAttribute('src') !== targetSrc) {
                img.classList.add("fade-out");
                setTimeout(() => {
                    img.src = targetSrc;
                    img.classList.remove("fade-out");
                }, 750);
            }

            // --- Logika Lirik ---
            const currentLine = [...daftarLirik].reverse().find(item => item.time <= currentTime);
            if (currentLine) {
                lyricsDiv.innerText = currentLine.text;
            }
        });
    });
</script>
</body>
</html>
